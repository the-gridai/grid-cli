# Grid SDK CI - Implementation
# This workflow is called by the router workflow

name: SDK CI Implementation

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: grid/packages/sdk-typescript/package-lock.json

      - name: Install dependencies
        working-directory: grid/packages/sdk-typescript
        run: npm ci

      - name: Build
        working-directory: grid/packages/sdk-typescript
        run: npm run build

      - name: Run tests
        working-directory: grid/packages/sdk-typescript
        run: npm test

  lint:
    name: Lint SDK
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: grid/packages/sdk-typescript/package-lock.json

      - name: Install dependencies
        working-directory: grid/packages/sdk-typescript
        run: npm ci

      - name: Run linter
        working-directory: grid/packages/sdk-typescript
        run: npm run lint || true  # Don't fail on lint errors for now

  typecheck:
    name: Type Check SDK
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: grid/packages/sdk-typescript/package-lock.json

      - name: Install dependencies
        working-directory: grid/packages/sdk-typescript
        run: npm ci

      - name: Type check
        working-directory: grid/packages/sdk-typescript
        run: npm run typecheck
