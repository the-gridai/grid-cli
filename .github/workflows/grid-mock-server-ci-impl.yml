# Grid Mock Server CI - Implementation
# This workflow is called by the router workflow

name: Mock Server CI Implementation

on:
  workflow_call:

jobs:
  test:
    name: Test Mock Server
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: grid/mock-server/package-lock.json

      - name: Install dependencies
        working-directory: grid/mock-server
        run: npm ci

      - name: Build
        working-directory: grid/mock-server
        run: npm run build

      - name: Run tests
        working-directory: grid/mock-server
        run: npm test
