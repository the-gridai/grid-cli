# =============================================================================
# Grid CLI - Continuous Integration
# Runs on all PRs and pushes to main (development branch)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  # Run on all PR targets (including stacked feature branches) — not only main/dev/demo
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Root Project Tests (Internal SDK, CLI, Strategies)
  # ===========================================================================
  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:unit

  # ===========================================================================
  # External SDK Tests (grid/packages/sdk-typescript)
  # ===========================================================================
  sdk-tests:
    name: External SDK Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: grid/packages/sdk-typescript/package-lock.json

      - name: Install SDK dependencies
        working-directory: grid/packages/sdk-typescript
        run: npm ci

      - name: Build SDK
        working-directory: grid/packages/sdk-typescript
        run: npm run build

      - name: Run SDK tests
        working-directory: grid/packages/sdk-typescript
        run: npm test

  # ===========================================================================
  # Mock Server Tests (grid/mock-server)
  # ===========================================================================
  mock-server-tests:
    name: Mock Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: grid/mock-server/package-lock.json

      - name: Install Mock Server dependencies
        working-directory: grid/mock-server
        run: npm ci

      - name: Build Mock Server
        working-directory: grid/mock-server
        run: npm run build

      - name: Run Mock Server tests
        working-directory: grid/mock-server
        run: npm test

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: grid-cli:test
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
